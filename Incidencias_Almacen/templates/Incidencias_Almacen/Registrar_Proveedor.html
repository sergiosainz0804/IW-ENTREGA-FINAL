{% extends 'Incidencias_Almacen/Base.html'%}
{% load static %}

{% block h1_titulo %} Registrar Proveedor {%endblock%}
{% block p_texto %} <a href="{% url 'DashBoard'%}"> DashBoard </a> {%endblock%}

{% block cod_css %} 
<link href="{% static 'Incidencias_Almacen/css/Registrar_Proveedor.css'%}" rel = 'stylesheet'/>
{%endblock%}
{% block content%}

<main>
    <form method="post">
        {% csrf_token%}
        
        <div id="frm">
        <section>

            <h2> Información de Contacto </h2>
            <label for="empresa"> Empresa </label>
            <input type="text" id="empresa" name="empresa" maxlength="200" required/>
            
            <label for="persona"> Persona de Contacto </label>
            <input type="text" id="persona" name="persona" maxlength="100" required/>

            <label for="email"> Email </label>
            <input type="email" id="email" name="email" required/>

            <label for="web"> Sitio Web </label>
            <input type="url" id="web" name="web" required/>

            <label for="direccion"> Dirección</label>
            <input type="text" id="direccion" name="direccion" required/>

        </section>

        <section class="legales">
            <h2> Datos Legales</h2>

            <label for="cif"> CIF </label>
            <input type="text" id="cif" name="cif" required/>

            <label for="plazo"> Plazo de Entrega </label>
            <input type="number" id="plazo" name="plazo" min="0">

            <label for="pago"> Condiciones de Pago </label>
            <select id="pago" name="pago">
                <option> Al Contado </option>
                <option> Transferencia 30 dias </option>
                <option> Transferencia 60 dias </option>
            </select>
        </section>

        </div>

         <input type="submit" value="Registrar" id="sbm">



    </form>
</main>


{%endblock%}
